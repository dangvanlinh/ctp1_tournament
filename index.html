<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cờ Tỷ Phú Tournament</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3347;
      --gold: #f0b429;
      --gold-dim: #c8922a;
      --green: #2ecc71;
      --red: #e74c3c;
      --blue: #3b82f6;
      --text: #e2e8f0;
      --text-dim: #8892a4;
      --radius: 10px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 2px solid var(--gold);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 1.25rem; font-weight: 700; color: var(--gold); letter-spacing: 0.5px; }
    .logo span { color: var(--text); font-weight: 400; font-size: 0.9rem; margin-left: 8px; opacity: 0.6; }
    .date-badge {
      font-size: 0.8rem; color: var(--text-dim);
      background: var(--surface2); padding: 4px 10px; border-radius: 20px;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      gap: 4px;
      background: var(--surface);
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
    }
    nav button {
      background: none; border: none; color: var(--text-dim);
      padding: 14px 20px; cursor: pointer; font-size: 0.9rem;
      border-bottom: 3px solid transparent; transition: all .2s;
      display: flex; align-items: center; gap: 6px;
    }
    nav button:hover { color: var(--text); }
    nav button.active { color: var(--gold); border-bottom-color: var(--gold); font-weight: 600; }

    /* ── Main ── */
    main { max-width: 860px; margin: 0 auto; padding: 28px 20px; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Section cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-dim); margin-bottom: 14px;
    }

    /* ── Inputs & Buttons ── */
    .input-row { display: flex; gap: 10px; }
    input[type="text"] {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 9px 14px; border-radius: 6px; font-size: 0.9rem;
      outline: none; transition: border-color .2s;
    }
    input[type="text"]:focus { border-color: var(--gold); }
    input[type="text"]::placeholder { color: var(--text-dim); }

    .btn {
      padding: 9px 18px; border: none; border-radius: 6px; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .btn-gold { background: var(--gold); color: #000; }
    .btn-gold:hover { background: #f5c842; }
    .btn-outline {
      background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    }
    .btn-outline:hover { border-color: var(--text-dim); color: var(--text); }
    .btn-danger { background: transparent; border: 1px solid #e74c3c44; color: var(--red); }
    .btn-danger:hover { background: #e74c3c22; }
    .btn-sm { padding: 5px 12px; font-size: 0.78rem; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Members list ── */
    .member-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .member-chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 12px; font-size: 0.85rem;
    }
    .member-chip .avatar {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--gold); color: #000;
      font-size: 0.7rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .member-chip .rm {
      background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 1rem; line-height: 1; padding: 0;
      transition: color .15s;
    }
    .member-chip .rm:hover { color: var(--red); }
    .empty-hint { color: var(--text-dim); font-size: 0.85rem; }

    /* ── Pairing ── */
    .pairing-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; flex-wrap: gap;
    }
    .pairing-header h2 { font-size: 1rem; font-weight: 600; }
    .pairing-actions { display: flex; gap: 8px; }

    .match-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 10px; transition: border-color .2s;
    }
    .match-card.done { border-color: #2e7d3255; background: #1a2a1a; }
    .match-card.done .match-player { opacity: 0.75; }

    .match-player {
      flex: 1; text-align: center;
    }
    .match-player .p-name { font-weight: 600; font-size: 0.95rem; }
    .match-player .p-elo { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; }

    .vs-badge {
      color: var(--text-dim); font-size: 0.75rem; font-weight: 700;
      letter-spacing: 1px; min-width: 28px; text-align: center;
    }

    .match-result { display: flex; gap: 6px; align-items: center; }
    .result-btn {
      padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--text-dim); font-size: 0.78rem;
      cursor: pointer; transition: all .15s; font-weight: 600;
    }
    .result-btn:hover { border-color: var(--text-dim); color: var(--text); }
    .result-btn.win  { background: #1a3a1a; border-color: var(--green); color: var(--green); }
    .result-btn.draw { background: #2a2a1a; border-color: var(--gold);  color: var(--gold); }
    .result-btn.lose { background: #3a1a1a; border-color: var(--red);   color: var(--red); }

    .result-display {
      font-size: 0.8rem; font-weight: 700; padding: 4px 10px;
      border-radius: 6px; white-space: nowrap;
    }
    .result-display.p1 { color: var(--green); background: #1a3a1a; border: 1px solid var(--green); }
    .result-display.p2 { color: var(--red);   background: #3a1a1a; border: 1px solid var(--red); }
    .result-display.draw { color: var(--gold); background: #2a2a1a; border: 1px solid var(--gold); }

    .bye-card {
      background: var(--surface2); border: 1px dashed var(--border);
      border-radius: var(--radius); padding: 10px 16px;
      font-size: 0.82rem; color: var(--text-dim); margin-bottom: 10px;
    }

    .empty-pairing {
      text-align: center; padding: 40px 20px; color: var(--text-dim);
    }
    .empty-pairing .icon { font-size: 2.5rem; margin-bottom: 10px; }
    .empty-pairing p { font-size: 0.9rem; margin-bottom: 16px; }

    /* ── History ── */
    .history-day {
      margin-bottom: 20px;
    }
    .history-day-label {
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-dim); margin-bottom: 10px;
      padding-bottom: 6px; border-bottom: 1px solid var(--border);
    }
    .history-match {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 6px;
      background: var(--surface2); margin-bottom: 6px; font-size: 0.85rem;
    }
    .history-match .hm-player { flex: 1; }
    .history-match .hm-player.winner { color: var(--green); font-weight: 600; }
    .history-match .hm-player.loser  { color: var(--text-dim); }
    .history-match .hm-vs { color: var(--text-dim); font-size: 0.75rem; }
    .history-match .hm-result { font-size: 0.75rem; color: var(--text-dim); margin-left: auto; }

    /* ── Standings ── */
    .standings-table { width: 100%; border-collapse: collapse; }
    .standings-table th {
      text-align: left; padding: 8px 12px; font-size: 0.72rem;
      text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim);
      border-bottom: 1px solid var(--border);
    }
    .standings-table th.num { text-align: right; }
    .standings-table td { padding: 10px 12px; border-bottom: 1px solid var(--border)22; }
    .standings-table tr:last-child td { border-bottom: none; }
    .standings-table td.num { text-align: right; color: var(--text-dim); font-size: 0.85rem; }
    .standings-table .pts { color: var(--gold); font-weight: 700; font-size: 1rem; }
    .standings-table .rank { color: var(--text-dim); font-size: 0.8rem; min-width: 24px; }
    .rank-1 { color: #f0b429; }
    .rank-2 { color: #94a3b8; }
    .rank-3 { color: #cd7f32; }

    .player-cell { display: flex; align-items: center; gap: 10px; }
    .player-cell .av {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; color: #000; flex-shrink: 0;
    }

    .badge {
      display: inline-block; padding: 2px 7px; border-radius: 12px;
      font-size: 0.72rem; font-weight: 600; margin-left: 6px;
    }
    .badge-gold { background: #f0b42922; color: var(--gold); border: 1px solid #f0b42944; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--surface2); border: 1px solid var(--border);
      padding: 10px 20px; border-radius: 8px; font-size: 0.85rem;
      opacity: 0; transition: all .3s; pointer-events: none; z-index: 999;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Utilities ── */
    .flex { display: flex; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .gap-2 { gap: 8px; }
    .mt-2 { margin-top: 8px; }
    .mt-3 { margin-top: 12px; }
    .text-dim { color: var(--text-dim); }
    .text-sm { font-size: 0.82rem; }
    .stat-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .stat-box {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 16px; flex: 1; min-width: 100px;
    }
    .stat-box .s-val { font-size: 1.5rem; font-weight: 700; color: var(--gold); }
    .stat-box .s-label { font-size: 0.72rem; color: var(--text-dim); margin-top: 2px; }

    @media (max-width: 600px) {
      nav button { padding: 12px 12px; font-size: 0.82rem; }
      .match-card { flex-wrap: wrap; }
      .match-result { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">♟ Cờ Tỷ Phú <span>Tournament</span></div>
  <div class="date-badge" id="today-label"></div>
</header>

<nav>
  <button class="active" onclick="switchTab('members')" id="tab-members">👥 Thành Viên</button>
  <button onclick="switchTab('pairing')"  id="tab-pairing">⚔️ Đấu Hôm Nay</button>
  <button onclick="switchTab('standings')" id="tab-standings">🏆 Bảng Xếp Hạng</button>
  <button onclick="switchTab('history')"  id="tab-history">📋 Lịch Sử</button>
</nav>

<main>

  <!-- ══ MEMBERS ══ -->
  <div class="tab-content active" id="tab-content-members">
    <div class="card">
      <div class="card-title">Thêm thành viên</div>
      <div class="input-row">
        <input type="text" id="member-input" placeholder="Tên thành viên..." maxlength="30"
               onkeydown="if(event.key==='Enter') addMember()" />
        <button class="btn btn-gold" onclick="addMember()">Thêm</button>
      </div>
    </div>
    <div class="card">
      <div class="flex-between" style="margin-bottom:14px">
        <div class="card-title" style="margin:0">Danh sách (<span id="member-count">0</span> người)</div>
      </div>
      <div class="member-list" id="member-list">
        <span class="empty-hint">Chưa có thành viên nào.</span>
      </div>
    </div>
  </div>

  <!-- ══ PAIRING ══ -->
  <div class="tab-content" id="tab-content-pairing">
    <div class="card">
      <div class="pairing-header">
        <h2 id="pairing-date-title">Cặp đấu hôm nay</h2>
        <div class="pairing-actions">
          <button class="btn btn-outline btn-sm" onclick="resetTodayRound()" id="btn-reset-round" style="display:none">
            🔄 Tạo lại
          </button>
          <button class="btn btn-gold btn-sm" onclick="generatePairing()" id="btn-generate">
            🎲 Tạo Cặp Đấu
          </button>
        </div>
      </div>
      <div id="pairing-area">
        <div class="empty-pairing">
          <div class="icon">🎲</div>
          <p>Chưa có cặp đấu nào cho hôm nay.</p>
          <button class="btn btn-gold" onclick="generatePairing()">Tạo Cặp Đấu Ngẫu Nhiên</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ STANDINGS ══ -->
  <div class="tab-content" id="tab-content-standings">
    <div class="stat-row" id="summary-stats" style="margin-bottom:16px"></div>
    <div class="card">
      <div class="card-title">Bảng xếp hạng</div>
      <table class="standings-table">
        <thead>
          <tr>
            <th style="width:36px">#</th>
            <th>Thành Viên</th>
            <th class="num">Trận</th>
            <th class="num">T</th>
            <th class="num">H</th>
            <th class="num">B</th>
            <th class="num">Điểm</th>
          </tr>
        </thead>
        <tbody id="standings-body"></tbody>
      </table>
    </div>
  </div>

  <!-- ══ HISTORY ══ -->
  <div class="tab-content" id="tab-content-history">
    <div class="card">
      <div class="flex-between" style="margin-bottom:4px">
        <div class="card-title" style="margin:0">Lịch sử thi đấu</div>
      </div>
      <div id="history-area">
        <span class="empty-hint">Chưa có trận nào.</span>
      </div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
// ─── State ───────────────────────────────────────────────────────────
const STORAGE_KEY = 'ctp1_tournament_v1';

let state = {
  members: [],   // [{id, name, color}]
  rounds: [],    // [{date: 'YYYY-MM-DD', pairs: [{p1, p2, result: null|'p1'|'draw'|'p2'}]}]
};

const AVATAR_COLORS = [
  '#f0b429','#3b82f6','#2ecc71','#e74c3c','#9b59b6',
  '#1abc9c','#e67e22','#e91e63','#00bcd4','#8bc34a',
  '#ff5722','#607d8b','#795548','#673ab7','#03a9f4',
];

// ─── Persistence ─────────────────────────────────────────────────────
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try { state = JSON.parse(raw); } catch(e) {}
  }
}

// ─── Helpers ─────────────────────────────────────────────────────────
function todayStr() {
  return new Date().toISOString().slice(0, 10);
}
function formatDate(d) {
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
}
function initials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
}
function getMember(id) { return state.members.find(m => m.id === id); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─── Members ─────────────────────────────────────────────────────────
function addMember() {
  const input = document.getElementById('member-input');
  const name = input.value.trim();
  if (!name) return;
  if (state.members.find(m => m.name.toLowerCase() === name.toLowerCase())) {
    toast('Tên này đã tồn tại!'); return;
  }
  const colorIdx = state.members.length % AVATAR_COLORS.length;
  state.members.push({ id: uid(), name, color: AVATAR_COLORS[colorIdx] });
  input.value = '';
  save();
  renderMembers();
  toast(`Đã thêm "${name}"`);
}

function removeMember(id) {
  const m = getMember(id);
  if (!m) return;
  if (!confirm(`Xóa "${m.name}" khỏi danh sách?`)) return;
  state.members = state.members.filter(x => x.id !== id);
  // Remove from rounds too
  state.rounds.forEach(r => {
    r.pairs = r.pairs.filter(p => p.p1 !== id && p.p2 !== id);
  });
  save();
  renderMembers();
  renderPairing();
  renderStandings();
  toast(`Đã xóa "${m.name}"`);
}

function renderMembers() {
  const list = document.getElementById('member-list');
  const count = document.getElementById('member-count');
  count.textContent = state.members.length;
  if (state.members.length === 0) {
    list.innerHTML = '<span class="empty-hint">Chưa có thành viên nào.</span>';
    return;
  }
  list.innerHTML = state.members.map(m => `
    <div class="member-chip">
      <div class="avatar" style="background:${m.color}">${initials(m.name)}</div>
      <span>${m.name}</span>
      <button class="rm" onclick="removeMember('${m.id}')" title="Xóa">×</button>
    </div>
  `).join('');
}

// ─── Pairing ─────────────────────────────────────────────────────────
function getTodayRound() {
  return state.rounds.find(r => r.date === todayStr());
}

function generatePairing() {
  if (state.members.length < 2) {
    toast('Cần ít nhất 2 thành viên!'); return;
  }
  const existing = getTodayRound();
  const hasResults = existing && existing.pairs.some(p => p.result !== null);
  if (hasResults) {
    if (!confirm('Đã có kết quả hôm nay. Tạo lại sẽ xóa kết quả cũ. Tiếp tục?')) return;
  }
  if (existing) {
    state.rounds = state.rounds.filter(r => r.date !== todayStr());
  }

  const shuffled = shuffle(state.members);
  const pairs = [];
  let bye = null;
  for (let i = 0; i + 1 < shuffled.length; i += 2) {
    pairs.push({ p1: shuffled[i].id, p2: shuffled[i+1].id, result: null });
  }
  if (shuffled.length % 2 === 1) {
    bye = shuffled[shuffled.length - 1].id;
  }

  state.rounds.push({ date: todayStr(), pairs, bye: bye });
  save();
  renderPairing();
  toast('🎲 Đã tạo cặp đấu ngẫu nhiên!');
}

function setResult(date, pairIdx, result) {
  const round = state.rounds.find(r => r.date === date);
  if (!round) return;
  // Toggle off if same result clicked
  if (round.pairs[pairIdx].result === result) {
    round.pairs[pairIdx].result = null;
  } else {
    round.pairs[pairIdx].result = result;
  }
  save();
  renderPairing();
  renderStandings();
  renderHistory();
}

function resetTodayRound() {
  generatePairing();
}

function renderPairing() {
  const area = document.getElementById('pairing-area');
  const btnGen = document.getElementById('btn-generate');
  const btnReset = document.getElementById('btn-reset-round');
  const titleEl = document.getElementById('pairing-date-title');

  titleEl.textContent = `Cặp đấu — ${formatDate(todayStr())}`;

  const round = getTodayRound();
  if (!round) {
    btnGen.style.display = '';
    btnReset.style.display = 'none';
    area.innerHTML = `
      <div class="empty-pairing">
        <div class="icon">🎲</div>
        <p>Chưa có cặp đấu nào cho hôm nay.</p>
        <button class="btn btn-gold" onclick="generatePairing()">Tạo Cặp Đấu Ngẫu Nhiên</button>
      </div>`;
    return;
  }

  btnGen.style.display = 'none';
  btnReset.style.display = '';

  let html = '';
  round.pairs.forEach((pair, idx) => {
    const p1 = getMember(pair.p1);
    const p2 = getMember(pair.p2);
    if (!p1 || !p2) return;

    const done = pair.result !== null;
    const r = pair.result;

    // Result buttons / display
    let resultHTML = '';
    if (done) {
      let label = '', cls = '';
      if (r === 'p1')   { label = `${p1.name} thắng`; cls = 'p1'; }
      if (r === 'p2')   { label = `${p2.name} thắng`; cls = 'p2'; }
      if (r === 'draw') { label = 'Hòa'; cls = 'draw'; }
      resultHTML = `
        <span class="result-display ${cls}">${label}</span>
        <button class="btn btn-outline btn-sm" onclick="setResult('${round.date}',${idx},null)" style="margin-left:4px">Sửa</button>`;
    } else {
      resultHTML = `
        <button class="result-btn" onclick="setResult('${round.date}',${idx},'p1')" title="${p1.name} thắng">
          ${initials(p1.name)} Thắng
        </button>
        <button class="result-btn" onclick="setResult('${round.date}',${idx},'draw')">Hòa</button>
        <button class="result-btn" onclick="setResult('${round.date}',${idx},'p2')" title="${p2.name} thắng">
          ${initials(p2.name)} Thắng
        </button>`;
    }

    html += `
      <div class="match-card ${done ? 'done' : ''}">
        <div class="match-player">
          <div class="player-cell" style="justify-content:center">
            <div class="av" style="background:${p1.color}">${initials(p1.name)}</div>
            <div>
              <div class="p-name">${p1.name}</div>
              <div class="p-elo">${getPlayerPoints(p1.id)} điểm</div>
            </div>
          </div>
        </div>
        <div class="vs-badge">VS</div>
        <div class="match-player">
          <div class="player-cell" style="justify-content:center">
            <div>
              <div class="p-name" style="text-align:right">${p2.name}</div>
              <div class="p-elo" style="text-align:right">${getPlayerPoints(p2.id)} điểm</div>
            </div>
            <div class="av" style="background:${p2.color}">${initials(p2.name)}</div>
          </div>
        </div>
        <div class="match-result">${resultHTML}</div>
      </div>`;
  });

  if (round.bye) {
    const byePlayer = getMember(round.bye);
    if (byePlayer) {
      html += `<div class="bye-card">⏸ <b>${byePlayer.name}</b> được nghỉ hôm nay (lẻ người)</div>`;
    }
  }

  // Progress
  const total = round.pairs.length;
  const done  = round.pairs.filter(p => p.result !== null).length;
  html = `<div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:12px">
    Đã có kết quả: <b style="color:var(--gold)">${done}/${total}</b> trận
  </div>` + html;

  area.innerHTML = html;
}

// ─── Standings ───────────────────────────────────────────────────────
function getPlayerPoints(id, excludeDate = null) {
  let pts = 0;
  state.rounds.forEach(r => {
    if (excludeDate && r.date === excludeDate) return;
    r.pairs.forEach(p => {
      if (p.result === null) return;
      if (p.p1 === id && p.result === 'p1') pts += 3;
      if (p.p2 === id && p.result === 'p2') pts += 3;
      if ((p.p1 === id || p.p2 === id) && p.result === 'draw') pts += 1;
    });
  });
  return pts;
}

function getStandings() {
  return state.members.map(m => {
    let played = 0, wins = 0, draws = 0, losses = 0, points = 0;
    state.rounds.forEach(r => {
      r.pairs.forEach(p => {
        if (p.result === null) return;
        const isP1 = p.p1 === m.id, isP2 = p.p2 === m.id;
        if (!isP1 && !isP2) return;
        played++;
        if (p.result === 'draw') { draws++; points++; }
        else if ((isP1 && p.result === 'p1') || (isP2 && p.result === 'p2')) { wins++; points += 3; }
        else { losses++; }
      });
    });
    return { ...m, played, wins, draws, losses, points };
  }).sort((a, b) => b.points - a.points || b.wins - a.wins || a.losses - b.losses);
}

function renderStandings() {
  const standings = getStandings();
  const tbody = document.getElementById('standings-body');

  // Summary stats
  const totalMatches = state.rounds.reduce((s, r) => s + r.pairs.filter(p => p.result !== null).length, 0);
  const totalRounds  = state.rounds.length;
  document.getElementById('summary-stats').innerHTML = `
    <div class="stat-box"><div class="s-val">${state.members.length}</div><div class="s-label">Thành viên</div></div>
    <div class="stat-box"><div class="s-val">${totalRounds}</div><div class="s-label">Ngày thi đấu</div></div>
    <div class="stat-box"><div class="s-val">${totalMatches}</div><div class="s-label">Trận đã chơi</div></div>
  `;

  if (standings.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-dim)">Chưa có dữ liệu.</td></tr>`;
    return;
  }

  tbody.innerHTML = standings.map((p, i) => {
    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
    const badge = i === 0 && p.played > 0 ? `<span class="badge badge-gold">Dẫn đầu</span>` : '';
    return `<tr>
      <td class="rank ${rankClass}">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i+1}</td>
      <td>
        <div class="player-cell">
          <div class="av" style="background:${p.color}">${initials(p.name)}</div>
          <span>${p.name}${badge}</span>
        </div>
      </td>
      <td class="num">${p.played}</td>
      <td class="num" style="color:var(--green)">${p.wins}</td>
      <td class="num" style="color:var(--gold)">${p.draws}</td>
      <td class="num" style="color:var(--red)">${p.losses}</td>
      <td class="num pts">${p.points}</td>
    </tr>`;
  }).join('');
}

// ─── History ─────────────────────────────────────────────────────────
function renderHistory() {
  const area = document.getElementById('history-area');
  const roundsWithResults = state.rounds
    .filter(r => r.pairs.some(p => p.result !== null))
    .slice().reverse();

  if (roundsWithResults.length === 0) {
    area.innerHTML = '<span class="empty-hint">Chưa có trận nào.</span>';
    return;
  }

  area.innerHTML = roundsWithResults.map(r => {
    const matches = r.pairs.filter(p => p.result !== null).map(p => {
      const p1 = getMember(p.p1), p2 = getMember(p.p2);
      if (!p1 || !p2) return '';
      let p1cls = '', p2cls = '', resultLabel = '';
      if (p.result === 'p1')   { p1cls = 'winner'; p2cls = 'loser'; resultLabel = '+3/+0'; }
      if (p.result === 'p2')   { p1cls = 'loser'; p2cls = 'winner'; resultLabel = '+0/+3'; }
      if (p.result === 'draw') { p1cls = ''; p2cls = ''; resultLabel = '+1/+1'; }
      return `<div class="history-match">
        <span class="hm-player ${p1cls}">${p1.name}</span>
        <span class="hm-vs">vs</span>
        <span class="hm-player ${p2cls}">${p2.name}</span>
        <span class="hm-result">${resultLabel}</span>
      </div>`;
    }).join('');

    const isToday = r.date === todayStr();
    return `<div class="history-day">
      <div class="history-day-label">${formatDate(r.date)}${isToday ? ' — Hôm nay' : ''}</div>
      ${matches}
    </div>`;
  }).join('');
}

// ─── Tabs ─────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-content-${name}`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');

  if (name === 'pairing')   renderPairing();
  if (name === 'standings') renderStandings();
  if (name === 'history')   renderHistory();
}

// ─── Init ─────────────────────────────────────────────────────────────
function init() {
  load();

  // Date label
  const now = new Date();
  document.getElementById('today-label').textContent =
    now.toLocaleDateString('vi-VN', { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' });

  renderMembers();
  renderPairing();
  renderStandings();
  renderHistory();
}

init();
</script>
</body>
</html>
