<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cờ Tỷ Phú Tournament</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3347;
      --gold: #f0b429; --gold-dim: #c8922a; --green: #2ecc71; --red: #e74c3c;
      --blue: #3b82f6; --text: #e2e8f0; --text-dim: #8892a4; --radius: 10px;
    }

    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: var(--surface); border-bottom: 2px solid var(--gold);
      padding: 0 24px; display: flex; align-items: center;
      justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100;
    }
    .logo { font-size: 1.25rem; font-weight: 700; color: var(--gold); }
    .logo span { color: var(--text); font-weight: 400; font-size: 0.9rem; margin-left: 8px; opacity: 0.6; }
    .date-badge { font-size: 0.8rem; color: var(--text-dim); background: var(--surface2); padding: 4px 10px; border-radius: 20px; }

    nav { display: flex; gap: 4px; background: var(--surface); padding: 0 24px; border-bottom: 1px solid var(--border); }
    nav button {
      background: none; border: none; color: var(--text-dim); padding: 14px 20px;
      cursor: pointer; font-size: 0.9rem; border-bottom: 3px solid transparent; transition: all .2s;
    }
    nav button:hover { color: var(--text); }
    nav button.active { color: var(--gold); border-bottom-color: var(--gold); font-weight: 600; }

    main { max-width: 860px; margin: 0 auto; padding: 28px 20px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 14px; }

    .input-row { display: flex; gap: 10px; }
    input[type="text"] {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 9px 14px; border-radius: 6px; font-size: 0.9rem;
      outline: none; transition: border-color .2s;
    }
    input[type="text"]:focus { border-color: var(--gold); }
    input[type="text"]::placeholder { color: var(--text-dim); }

    .btn { padding: 9px 18px; border: none; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap; }
    .btn-gold { background: var(--gold); color: #000; }
    .btn-gold:hover { background: #f5c842; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
    .btn-outline:hover { border-color: var(--text-dim); color: var(--text); }
    .btn-sm { padding: 5px 12px; font-size: 0.78rem; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .member-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .member-chip { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 0.85rem; }
    .member-chip .avatar { width: 22px; height: 22px; border-radius: 50%; font-size: 0.7rem; font-weight: 700; color: #000; display: flex; align-items: center; justify-content: center; }
    .member-chip .rm { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1rem; line-height: 1; padding: 0; transition: color .15s; }
    .member-chip .rm:hover { color: var(--red); }
    .empty-hint { color: var(--text-dim); font-size: 0.85rem; }

    .pairing-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .pairing-header h2 { font-size: 1rem; font-weight: 600; }
    .pairing-actions { display: flex; gap: 8px; }

    .match-card {
      background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
    }
    .match-card.done { border-color: #2e7d3255; background: #1a2a1a; }
    .match-player { flex: 1; text-align: center; }
    .p-name { font-weight: 600; font-size: 0.95rem; }
    .vs-badge { color: var(--text-dim); font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; min-width: 28px; text-align: center; }
    .match-result { display: flex; gap: 6px; align-items: center; }

    .result-btn { padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-size: 0.78rem; cursor: pointer; transition: all .15s; font-weight: 600; }
    .result-btn:hover { border-color: var(--text-dim); color: var(--text); }

    .result-display { font-size: 0.8rem; font-weight: 700; padding: 4px 10px; border-radius: 6px; white-space: nowrap; }
    .result-display.p1  { color: var(--green); background: #1a3a1a; border: 1px solid var(--green); }
    .result-display.p2  { color: var(--red);   background: #3a1a1a; border: 1px solid var(--red); }
    .result-display.draw{ color: var(--gold);  background: #2a2a1a; border: 1px solid var(--gold); }

    .bye-card { background: var(--surface2); border: 1px dashed var(--border); border-radius: var(--radius); padding: 10px 16px; font-size: 0.82rem; color: var(--text-dim); margin-bottom: 10px; }

    .empty-pairing { text-align: center; padding: 40px 20px; color: var(--text-dim); }
    .empty-pairing .icon { font-size: 2.5rem; margin-bottom: 10px; }
    .empty-pairing p { font-size: 0.9rem; margin-bottom: 16px; }

    .history-day { margin-bottom: 20px; }
    .history-day-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .history-match { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 6px; background: var(--surface2); margin-bottom: 6px; font-size: 0.85rem; }
    .hm-player { flex: 1; }
    .hm-player.winner { color: var(--green); font-weight: 600; }
    .hm-player.loser  { color: var(--text-dim); }
    .hm-vs { color: var(--text-dim); font-size: 0.75rem; }
    .hm-result { font-size: 0.75rem; color: var(--text-dim); margin-left: auto; }

    .standings-table { width: 100%; border-collapse: collapse; }
    .standings-table th { text-align: left; padding: 8px 12px; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); border-bottom: 1px solid var(--border); }
    .standings-table th.num { text-align: right; }
    .standings-table td { padding: 10px 12px; border-bottom: 1px solid #2e334722; }
    .standings-table tr:last-child td { border-bottom: none; }
    .standings-table td.num { text-align: right; color: var(--text-dim); font-size: 0.85rem; }
    .standings-table .pts { color: var(--gold); font-weight: 700; font-size: 1rem; }
    .rank { color: var(--text-dim); font-size: 0.8rem; }
    .rank-1 { color: #f0b429; }
    .rank-2 { color: #94a3b8; }
    .rank-3 { color: #cd7f32; }
    .player-cell { display: flex; align-items: center; gap: 10px; }
    .player-cell .av { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: #000; flex-shrink: 0; }
    .badge { display: inline-block; padding: 2px 7px; border-radius: 12px; font-size: 0.72rem; font-weight: 600; margin-left: 6px; }
    .badge-gold { background: #f0b42922; color: var(--gold); border: 1px solid #f0b42944; }

    .stat-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .stat-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; flex: 1; min-width: 100px; }
    .stat-box .s-val { font-size: 1.5rem; font-weight: 700; color: var(--gold); }
    .stat-box .s-label { font-size: 0.72rem; color: var(--text-dim); margin-top: 2px; }

    .tg-banner { background: #1a2535; border: 1px solid #2a4a7a; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 0.82rem; color: #7ab3e0; display: flex; align-items: center; gap: 10px; }
    .tg-banner code { background: #0f1a2a; padding: 1px 5px; border-radius: 4px; font-size: 0.78rem; }

    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border); padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; opacity: 0; transition: all .3s; pointer-events: none; z-index: 999; white-space: nowrap; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .loading { opacity: 0.5; pointer-events: none; }

    @media (max-width: 600px) {
      nav button { padding: 12px 10px; font-size: 0.8rem; }
      .match-card { flex-wrap: wrap; }
      .match-result { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">♟ Cờ Tỷ Phú <span>Tournament</span></div>
  <div class="date-badge" id="today-label"></div>
</header>

<nav>
  <button class="active" onclick="switchTab('members')"  id="tab-members">👥 Thành Viên</button>
  <button onclick="switchTab('pairing')"                 id="tab-pairing">⚔️ Đấu Hôm Nay</button>
  <button onclick="switchTab('standings')"               id="tab-standings">🏆 Bảng Xếp Hạng</button>
  <button onclick="switchTab('history')"                 id="tab-history">📋 Lịch Sử</button>
</nav>

<main>

  <!-- MEMBERS -->
  <div class="tab-content active" id="tab-content-members">
    <div class="card">
      <div class="card-title">Thêm thành viên</div>
      <div class="input-row">
        <input type="text" id="member-input" placeholder="Tên thành viên..." maxlength="30"
               onkeydown="if(event.key==='Enter') addMember()" />
        <button class="btn btn-gold" onclick="addMember()">Thêm</button>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="card-title" style="margin:0">Danh sách (<span id="member-count">0</span> người)</div>
      </div>
      <div class="member-list" id="member-list"><span class="empty-hint">Đang tải...</span></div>
    </div>
  </div>

  <!-- PAIRING -->
  <div class="tab-content" id="tab-content-pairing">
    <div class="tg-banner">
      💬 Ai thắng thì nhắn trong group Telegram: <code>Tên +1</code> &nbsp;·&nbsp; Xem cặp đấu: <code>/capdat</code>
    </div>
    <div class="card">
      <div class="pairing-header">
        <h2 id="pairing-date-title">Cặp đấu hôm nay</h2>
        <div class="pairing-actions">
          <button class="btn btn-gold btn-sm" onclick="generatePairing()" id="btn-generate">🎲 Tạo Cặp Đấu</button>
        </div>
      </div>
      <div id="pairing-area">
        <div class="empty-pairing"><div class="icon">⏳</div><p>Đang tải...</p></div>
      </div>
    </div>
  </div>

  <!-- STANDINGS -->
  <div class="tab-content" id="tab-content-standings">
    <div class="stat-row" id="summary-stats"></div>
    <div class="card">
      <div class="card-title">Bảng xếp hạng</div>
      <table class="standings-table">
        <thead><tr>
          <th style="width:36px">#</th>
          <th>Thành Viên</th>
          <th class="num">Trận</th>
          <th class="num">T</th>
          <th class="num">H</th>
          <th class="num">B</th>
          <th class="num">Điểm</th>
        </tr></thead>
        <tbody id="standings-body"></tbody>
      </table>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="tab-content" id="tab-content-history">
    <div class="card">
      <div class="card-title" style="margin-bottom:14px">Lịch sử thi đấu</div>
      <div id="history-area"><span class="empty-hint">Đang tải...</span></div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
const $ = id => document.getElementById(id);

// ─── API ──────────────────────────────────────────────────────────────
async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== null) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
  return data;
}

// ─── Utils ────────────────────────────────────────────────────────────
function todayStr() {
  return new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Ho_Chi_Minh' });
}
function formatDate(d) {
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
}
function initials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
}
function toast(msg) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

// ─── Members ──────────────────────────────────────────────────────────
async function loadMembers() {
  const members = await api('/api/members');
  renderMembers(members);
}

function renderMembers(members) {
  $('member-count').textContent = members.length;
  const list = $('member-list');
  if (!members.length) {
    list.innerHTML = '<span class="empty-hint">Chưa có thành viên nào.</span>';
    return;
  }
  list.innerHTML = members.map(m => `
    <div class="member-chip">
      <div class="avatar" style="background:${m.color}">${initials(m.name)}</div>
      <span>${m.name}</span>
      <button class="rm" onclick="removeMember('${m.id}','${m.name.replace(/'/g, "\\'")}')">×</button>
    </div>`).join('');
}

async function addMember() {
  const input = $('member-input');
  const name = input.value.trim();
  if (!name) return;
  try {
    await api('/api/members', 'POST', { name });
    input.value = '';
    await loadMembers();
    toast(`Đã thêm "${name}"`);
  } catch (e) { toast(e.message); }
}

async function removeMember(id, name) {
  if (!confirm(`Xóa "${name}" khỏi danh sách?`)) return;
  try {
    await api(`/api/members?id=${id}`, 'DELETE');
    await loadMembers();
    toast(`Đã xóa "${name}"`);
  } catch (e) { toast(e.message); }
}

// ─── Pairing ──────────────────────────────────────────────────────────
let currentRound = null;

async function loadPairing() {
  $('pairing-date-title').textContent = `Cặp đấu — ${formatDate(todayStr())}`;
  try {
    currentRound = await api(`/api/rounds?date=${todayStr()}`);
  } catch (e) { currentRound = null; }
  renderPairing();
}

async function generatePairing() {
  try {
    currentRound = await api('/api/rounds', 'POST', { date: todayStr(), force: false });
    renderPairing();
    toast('🎲 Đã tạo cặp đấu ngẫu nhiên!');
  } catch (e) { toast('Lỗi: ' + e.message); }
}

async function setResult(pairId, result) {
  try {
    const updated = await api('/api/results', 'PUT', { pair_id: pairId, result });
    if (currentRound) {
      const idx = currentRound.pairs.findIndex(p => p.id === pairId);
      if (idx !== -1) currentRound.pairs[idx] = updated;
    }
    renderPairing();
  } catch (e) { toast('Lỗi: ' + e.message); }
}

function renderPairing() {
  const area = $('pairing-area');
  const btnGen = $('btn-generate');

  if (!currentRound) {
    btnGen.style.display = '';
    area.innerHTML = `<div class="empty-pairing">
      <div class="icon">🎲</div>
      <p>Chưa có cặp đấu nào cho hôm nay.</p>
      <button class="btn btn-gold" onclick="generatePairing()">Tạo Cặp Đấu Ngẫu Nhiên</button>
    </div>`;
    return;
  }

  btnGen.style.display = 'none';

  const activePairs = currentRound.pairs.filter(p => !p.is_bye);
  const byePair     = currentRound.pairs.find(p => p.is_bye);
  const done = activePairs.filter(p => p.result !== null).length;

  let html = `<div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:12px">
    Đã có kết quả: <b style="color:var(--gold)">${done}/${activePairs.length}</b> trận
  </div>`;

  activePairs.forEach(pair => {
    const p1 = pair.p1, p2 = pair.p2;
    if (!p1 || !p2) return;
    const isDone = pair.result !== null;

    let resultHTML;
    if (isDone) {
      const label = pair.result === 'draw' ? 'Hòa'
        : pair.result === 'p1' ? `${p1.name} thắng` : `${p2.name} thắng`;
      const cls = pair.result === 'draw' ? 'draw' : pair.result;
      resultHTML = `
        <span class="result-display ${cls}">${label}</span>
        <button class="btn btn-outline btn-sm" onclick="setResult('${pair.id}',null)" style="margin-left:4px">Sửa</button>`;
    } else {
      resultHTML = `
        <button class="result-btn" onclick="setResult('${pair.id}','p1')">${initials(p1.name)} Thắng</button>
        <button class="result-btn" onclick="setResult('${pair.id}','draw')">Hòa</button>
        <button class="result-btn" onclick="setResult('${pair.id}','p2')">${initials(p2.name)} Thắng</button>`;
    }

    html += `
      <div class="match-card ${isDone ? 'done' : ''}">
        <div class="match-player">
          <div class="player-cell" style="justify-content:center">
            <div class="av" style="background:${p1.color}">${initials(p1.name)}</div>
            <div class="p-name">${p1.name}</div>
          </div>
        </div>
        <div class="vs-badge">VS</div>
        <div class="match-player">
          <div class="player-cell" style="justify-content:center">
            <div class="p-name">${p2.name}</div>
            <div class="av" style="background:${p2.color}">${initials(p2.name)}</div>
          </div>
        </div>
        <div class="match-result">${resultHTML}</div>
      </div>`;
  });

  if (byePair?.p1) {
    html += `<div class="bye-card">⏸ <b>${byePair.p1.name}</b> được nghỉ hôm nay (lẻ người)</div>`;
  }

  area.innerHTML = html;
}

// ─── Standings ────────────────────────────────────────────────────────
async function loadStandings() {
  try {
    const { standings, totalRounds, totalMatches } = await api('/api/standings');
    $('summary-stats').innerHTML = `
      <div class="stat-box"><div class="s-val">${standings.length}</div><div class="s-label">Thành viên</div></div>
      <div class="stat-box"><div class="s-val">${totalRounds}</div><div class="s-label">Ngày thi đấu</div></div>
      <div class="stat-box"><div class="s-val">${totalMatches}</div><div class="s-label">Trận đã chơi</div></div>`;

    const tbody = $('standings-body');
    if (!standings.length) {
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-dim)">Chưa có dữ liệu.</td></tr>`;
      return;
    }
    tbody.innerHTML = standings.map((p, i) => {
      const rankCls = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
      const badge = i === 0 && p.played > 0 ? `<span class="badge badge-gold">Dẫn đầu</span>` : '';
      const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1;
      return `<tr>
        <td class="rank ${rankCls}">${medal}</td>
        <td><div class="player-cell">
          <div class="av" style="background:${p.color}">${initials(p.name)}</div>
          <span>${p.name}${badge}</span>
        </div></td>
        <td class="num">${p.played}</td>
        <td class="num" style="color:var(--green)">${p.wins}</td>
        <td class="num" style="color:var(--gold)">${p.draws}</td>
        <td class="num" style="color:var(--red)">${p.losses}</td>
        <td class="num pts">${p.points}</td>
      </tr>`;
    }).join('');
  } catch (e) { toast('Lỗi tải bảng xếp hạng'); }
}

// ─── History ──────────────────────────────────────────────────────────
async function loadHistory() {
  try {
    const rounds = await api('/api/rounds?all=true');
    const area = $('history-area');
    const today = todayStr();
    const withResults = rounds.filter(r => r.pairs.some(p => p.result && !p.is_bye));
    if (!withResults.length) { area.innerHTML = '<span class="empty-hint">Chưa có trận nào.</span>'; return; }

    area.innerHTML = withResults.map(r => {
      const matches = r.pairs.filter(p => p.result && !p.is_bye).map(p => {
        if (!p.p1 || !p.p2) return '';
        const p1cls = p.result === 'p1' ? 'winner' : p.result === 'p2' ? 'loser' : '';
        const p2cls = p.result === 'p2' ? 'winner' : p.result === 'p1' ? 'loser' : '';
        const pts   = p.result === 'draw' ? '+1/+1' : p.result === 'p1' ? '+3/+0' : '+0/+3';
        return `<div class="history-match">
          <span class="hm-player ${p1cls}">${p.p1.name}</span>
          <span class="hm-vs">vs</span>
          <span class="hm-player ${p2cls}">${p.p2.name}</span>
          <span class="hm-result">${pts}</span>
        </div>`;
      }).join('');
      return `<div class="history-day">
        <div class="history-day-label">${formatDate(r.date)}${r.date === today ? ' — Hôm nay' : ''}</div>
        ${matches}
      </div>`;
    }).join('');
  } catch (e) { toast('Lỗi tải lịch sử'); }
}

// ─── Tabs ─────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
  $(`tab-content-${name}`).classList.add('active');
  $(`tab-${name}`).classList.add('active');
  if (name === 'members')   loadMembers();
  if (name === 'pairing')   loadPairing();
  if (name === 'standings') loadStandings();
  if (name === 'history')   loadHistory();
}

// ─── Init ─────────────────────────────────────────────────────────────
async function init() {
  $('today-label').textContent = new Date().toLocaleDateString('vi-VN', {
    weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric'
  });
  await loadMembers();
  currentRound = await api(`/api/rounds?date=${todayStr()}`).catch(() => null);
  $('pairing-date-title').textContent = `Cặp đấu — ${formatDate(todayStr())}`;
}

init();
</script>
</body>
